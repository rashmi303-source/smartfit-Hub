{% extends 'core/base.html' %}

{% block title %}Login - SmartFit Hub{% endblock %}

{% block content %}
<!-- Fitness Background Overlay -->
<div class="fitness-bg-overlay">
    <div class="fitness-bg-pattern"></div>
    <div class="fitness-bg-gym"></div>
</div>

<div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
        <div class="card shadow-lg border-0 rounded-4 login-card">
            <div class="card-body p-5">
                <div class="text-center mb-5">
                    <i class="fas fa-dumbbell fa-3x text-primary mb-3 animate-pulse"></i>
                    <h2 class="fw-bold text-primary mb-1">SmartFit Hub</h2>
                    <p class="text-white-50 mb-0">Sign in to continue your fitness journey</p>
                </div>

                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-4">
                        <label for="username" class="form-label fw-semibold text-white">Username</label>
                        <div class="input-group">
                            <span class="input-group-text bg-transparent border-light"><i class="fas fa-user text-primary"></i></span>
                            <input type="text"
                                   name="username"
                                   id="username"
                                   class="form-control form-control-lg bg-white/80"
                                   placeholder="Enter your username"
                                   required>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="password" class="form-label fw-semibold text-white">Password</label>
                        <div class="input-group">
                            <span class="input-group-text bg-transparent border-light"><i class="fas fa-lock text-primary"></i></span>
                            <input type="password"
                                   name="password"
                                   id="password"
                                   class="form-control form-control-lg bg-white/80"
                                   placeholder="Enter your password"
                                   required>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary btn-lg w-100 py-3 fw-bold shadow-sm btn-glow">
                        <i class="fas fa-sign-in-alt me-2"></i>Sign In
                    </button>
                </form>

                <div class="text-center mt-4 pt-3 border-top border-light">
                    <p class="mb-0 text-white-50">Don't have an account?
                        <a href="/register/" class="text-primary fw-bold text-decoration-none">Sign up here</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
