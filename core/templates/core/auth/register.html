{% extends 'core/base.html' %}

{% block title %}Register - SmartFit Hub{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow-lg border-0 rounded-4">
            <div class="card-body p-5">
                <div class="text-center mb-5">
                    <i class="fas fa-user-plus fa-3x text-success mb-3"></i>
                    <h2 class="fw-bold text-success mb-1">Join SmartFit Hub</h2>
                    <p class="text-muted mb-0">Create your free account to start your fitness journey</p>
                </div>
                
                <form method="POST">
                    {% csrf_token %}
                    
                    <div class="row">
                        <div class="col-md-6 mb-4">
                            <label for="first_name" class="form-label fw-semibold">First Name</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-user"></i></span>
                                <input type="text" 
                                       name="first_name" 
                                       id="first_name"
                                       class="form-control form-control-lg" 
                                       placeholder="John">
                            </div>
                        </div>
                        <div class="col-md-6 mb-4">
                            <label for="last_name" class="form-label fw-semibold">Last Name</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-user"></i></span>
                                <input type="text" 
                                       name="last_name" 
                                       id="last_name"
                                       class="form-control form-control-lg" 
                                       placeholder="Doe">
                            </div>
                        </div>
                    </div>
                    
                    <div class="mb-4">
                        <label for="email" class="form-label fw-semibold">Email</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                            <input type="email" 
                                   name="email" 
                                   id="email"
                                   class="form-control form-control-lg" 
                                   placeholder="john@example.com"
                                   required>
                        </div>
                    </div>
                    
                    <div class="mb-4">
                        <label for="username" class="form-label fw-semibold">Username</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-user-circle"></i></span>
                            <input type="text" 
                                   name="username" 
                                   id="username"
                                   class="form-control form-control-lg" 
                                   placeholder="john_doe"
                                   required>
                        </div>
                    </div>
                    
                    <div class="mb-4">
                        <label for="password" class="form-label fw-semibold">Password</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-lock"></i></span>
                            <input type="password" 
                                   name="password" 
                                   id="password"
                                   class="form-control form-control-lg" 
                                   placeholder="At least 6 characters"
                                   minlength="6"
                                   required>
                        </div>
                        <div class="form-text">Password must be at least 6 characters long</div>
                    </div>
                    
                    <button type="submit" class="btn btn-success btn-lg w-100 py-3 fw-bold shadow-sm mb-3">
                        <i class="fas fa-user-plus me-2"></i>Create Account
                    </button>
                </form>
                
                <div class="text-center pt-3 border-top">
                    <p class="mb-0 text-muted">Already have an account? 
                        <a href="/login/" class="text-success fw-bold text-decoration-none">Sign in here</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
